<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault v10 | Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; font-family: 'Space Grotesk', sans-serif; color: #0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .v10-border { border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; background: rgba(0,20,0,0.9); }
        .matrix-btn { border: 1px solid #0f0; transition: 0.3s; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .matrix-btn:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }
        #timer { height: 4px; background: #0f0; width: 0%; transition: width 30s linear; }
        canvas { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-lg v10-border rounded-3xl p-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl italic tracking-tighter">VAULT V10 <span class="text-white">MATRIX</span></h1>
            <p class="text-[10px] text-white opacity-50 mt-1 uppercase">Pixel-Shredder Protocol Activated</p>
        </header>

        <div class="space-y-4 mb-6">
            <input type="password" id="vaultKey" placeholder="ENTER MATRIX KEY" class="w-full bg-black border border-green-900 p-4 rounded-xl outline-none text-green-400 font-bold text-center">
            
            <label class="block w-full bg-green-900/20 border border-dashed border-green-500 p-6 rounded-xl text-center cursor-pointer">
                <span id="fileLabel" class="text-xs font-black">LOAD TARGET IMAGE</span>
                <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleFile(this)">
            </label>
        </div>

        <div id="previewBox" class="hidden mb-6 rounded-xl overflow-hidden border border-green-500">
            <img id="preview" src="" class="w-full h-auto opacity-50">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="transform('shred')" class="matrix-btn py-5 rounded-xl">Shred (Hide)</button>
            <button onclick="transform('restore')" class="matrix-btn py-5 rounded-xl bg-green-900/30">Restore (View)</button>
        </div>

        <div id="resArea" class="hidden space-y-4">
            <div class="p-2 border border-green-500 rounded-xl bg-black">
                <img id="outputImg" src="" class="w-full rounded-lg shadow-2xl">
                <div id="timer" class="mt-2"></div>
            </div>
            <a id="dlBtn" class="block text-center text-[10px] font-bold text-white underline tracking-widest uppercase">Download Shadow</a>
        </div>
    </div>

    <canvas id="c"></canvas>

    <script>
        let rawImg = null;
        let burn;

        function handleFile(i) {
            const f = i.files[0];
            const r = new FileReader();
            r.onload = (e) => {
                rawImg = e.target.result;
                document.getElementById('preview').src = rawImg;
                document.getElementById('previewBox').classList.remove('hidden');
                document.getElementById('fileLabel').innerText = "DATA LOADED";
            };
            r.readAsDataURL(f);
        }

        async function transform(mode) {
            const key = document.getElementById('vaultKey').value;
            if(!key || !rawImg) return alert("Key and Image Required");

            const img = new Image();
            img.src = rawImg;
            await img.decode();

            const cvs = document.getElementById('c');
            const ctx = cvs.getContext('2d');
            cvs.width = img.width; cvs.height = img.height;
            ctx.drawImage(img, 0, 0);

            const data = ctx.getImageData(0, 0, cvs.width, cvs.height);
            const pixels = data.data;

            // Generate Seed from Key
            let seed = 0;
            for(let i=0; i<key.length; i++) seed += key.charCodeAt(i) * (i+1);

            // MATRIX TRANSFORMATION (XOR SHIFT)
            // This shreds the image into high-entropy noise
            for (let i = 0; i < pixels.length; i += 4) {
                // We don't touch Alpha (pixels[i+3]) to keep the image solid
                pixels[i] = pixels[i] ^ (seed % 255);     // Red
                pixels[i+1] = pixels[i+1] ^ ((seed * 2) % 255); // Green
                pixels[i+2] = pixels[i+2] ^ ((seed * 3) % 255); // Blue
                
                // Shuffle logic: mix the seed to change next pixel
                seed = (seed * 16807) % 2147483647;
            }

            ctx.putImageData(data, 0, 0);
            const final = cvs.toDataURL("image/png");
            
            const out = document.getElementById('outputImg');
            out.src = final;
            document.getElementById('resArea').classList.remove('hidden');
            
            const dl = document.getElementById('dlBtn');
            dl.href = final;
            dl.download = mode === 'shred' ? "shadow_matrix.png" : "restored_vault.png";

            // Purge Timer
            const bar = document.getElementById('timer');
            clearTimeout(burn);
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(() => { bar.style.transition = 'width 30s linear'; bar.style.width = '100%'; }, 50);
            burn = setTimeout(() => { document.getElementById('resArea').classList.add('hidden'); out.src=""; }, 30000);
        }
    </script>
</body>
</html>
